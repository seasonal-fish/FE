name: Deploy FE

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) AWS 자격증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 2) ECR 로그인
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 3) Docker 이미지 빌드 및 ECR 푸시
      - name: Build and Push
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:8080 \
            -t ${{ secrets.ECR_REGISTRY }}/seasonal-fish/app:fe-latest .
          docker push ${{ secrets.ECR_REGISTRY }}/seasonal-fish/app:fe-latest

      # 4) docker-compose.yml 을 EC2 의 fe/ 디렉터리로 복사
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: docker-compose.yml
          target: /home/ec2-user/fe/

      # 5) EC2 접속 → .env 생성 → ECR 로그인 → 최신 이미지 pull & 재기동
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cat > /home/ec2-user/fe/.env <<'EOF'
            ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            EOF
            chmod 600 /home/ec2-user/fe/.env
            cd /home/ec2-user/fe
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker-compose pull
            docker-compose up -d
            docker image prune -f
