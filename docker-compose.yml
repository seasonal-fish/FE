# EC2(/home/ec2-user/fe/)에 두고 배포 시 사용하는 compose 파일입니다.
# 이미지는 CI(GitHub Actions)가 ECR에 푸시한 것을 pull 해서 실행합니다.
#
# 필요한 값은 같은 디렉터리의 .env 파일에서 읽습니다.
# 이 .env 는 배포 시 deploy.yml(GitHub Actions)이 GitHub Secret 값으로 자동 생성합니다:
#   ECR_REGISTRY - 예: 299139629755.dkr.ecr.ap-northeast-2.amazonaws.com

services:
  fe:
    image: ${ECR_REGISTRY}/seasonal-fish/app:fe-latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
